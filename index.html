<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TheAppAI — QR Bridge</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f0f13; color: #e8e8e8; min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; padding: 24px 16px;
  }
  h1 { font-size: 20px; font-weight: 500; color: #fff; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #888; margin-bottom: 28px; text-align: center; }
  .card {
    background: #1a1a22; border: 0.5px solid #2e2e3a; border-radius: 16px;
    padding: 20px; width: 100%; max-width: 400px; margin-bottom: 16px;
  }
  .card-title {
    font-size: 11px; font-weight: 500; color: #666; letter-spacing: 0.8px;
    text-transform: uppercase; margin-bottom: 12px;
  }
  label { display: block; font-size: 12px; color: #888; margin-bottom: 4px; margin-top: 12px; }
  label:first-of-type { margin-top: 0; }
  input[type="text"], input[type="password"] {
    width: 100%; background: #0f0f13; border: 0.5px solid #2e2e3a; border-radius: 8px;
    padding: 10px 12px; font-size: 13px; color: #e8e8e8; outline: none;
    transition: border-color 0.15s;
  }
  input:focus { border-color: #4f6ef7; }
  .btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; padding: 13px; border-radius: 10px; border: none;
    font-size: 15px; font-weight: 500; cursor: pointer; transition: opacity 0.15s, transform 0.1s;
  }
  .btn:active { transform: scale(0.98); opacity: 0.85; }
  .btn-primary { background: #4f6ef7; color: #fff; }
  .btn-scan { background: #1a1a22; border: 0.5px solid #2e2e3a; color: #e8e8e8; margin-bottom: 12px; }
  #video-container {
    display: none; width: 100%; max-width: 400px; margin-bottom: 16px;
    border-radius: 16px; overflow: hidden; border: 0.5px solid #2e2e3a;
    position: relative; background: #000;
  }
  #video { width: 100%; display: block; }
  .scan-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }
  .scan-frame { width: 200px; height: 200px; border: 2px solid #4f6ef7; border-radius: 12px; opacity: 0.8; }
  .scan-label {
    position: absolute; bottom: 14px; left: 0; right: 0; text-align: center;
    font-size: 12px; color: #fff; background: rgba(0,0,0,0.5); padding: 4px 0;
  }
  .status-box {
    width: 100%; max-width: 400px; padding: 12px 16px; border-radius: 10px;
    font-size: 13px; text-align: center; display: none; margin-bottom: 16px; word-break: break-word;
  }
  .status-success { background: #0d2a1a; border: 0.5px solid #1a5c34; color: #4ade80; }
  .status-error   { background: #2a0d0d; border: 0.5px solid #5c1a1a; color: #f87171; }
  .status-info    { background: #0d1a2a; border: 0.5px solid #1a3a5c; color: #60a5fa; }
  .divider { width: 100%; max-width: 400px; display: flex; align-items: center; gap: 10px; margin: 4px 0 16px; }
  .divider-line { flex: 1; height: 0.5px; background: #2e2e3a; }
  .divider-text { font-size: 11px; color: #555; }
</style>
</head>
<body>

<h1>TheAppAI</h1>
<p class="subtitle">Scansiona il QR code per sincronizzare il totem</p>

<div class="card">
  <div class="card-title">Configurazione WebPubSub</div>
  <label>Connection String</label>
  <input type="password" id="connStr"
    placeholder="Endpoint=...;AccessKey=...;Version=1.0;"
    value="Endpoint=https://theappxr.webpubsub.azure.com;AccessKey=aC6XttvKk8Tn6l+N453CUUf/inhqTIZgm7Z+e2Rm0DI=;Version=1.0;">
  <label>Hub</label>
  <input type="text" id="hub" value="totem">
  <label>Gruppo</label>
  <input type="text" id="group" value="totem-001">
</div>

<div id="status-box" class="status-box"></div>

<div id="video-container">
  <video id="video" autoplay playsinline muted></video>
  <div class="scan-overlay">
    <div class="scan-frame"></div>
    <div class="scan-label">Inquadra il QR code</div>
  </div>
</div>

<div style="width:100%;max-width:400px;">
  <button class="btn btn-scan" id="btn-scan" onclick="toggleScan()">Scansiona QR code</button>

  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-text">oppure inserisci manualmente</div>
    <div class="divider-line"></div>
  </div>

  <div class="card">
    <div class="card-title">Inserimento manuale</div>
    <label>Project ID</label>
    <input type="text" id="manualProjectId" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx">
    <label>Guide ID</label>
    <input type="text" id="manualGuideId" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx">
  </div>

  <button class="btn btn-primary" onclick="sendManual()">Invia al totem</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.19.1/umd/index.min.js"></script>
<script>
let codeReader = null;
let scanning   = false;

function showStatus(msg, type) {
  const box = document.getElementById('status-box');
  box.textContent = msg;
  box.className = 'status-box status-' + type;
  box.style.display = 'block';
}

function parseConnString(str) {
  const endpoint = str.match(/Endpoint=([^;]+)/)?.[1]?.replace(/\/$/, '');
  const key = str.match(/AccessKey=([^;]+)/)?.[1];
  return { endpoint, key };
}

// Base64URL encode di un ArrayBuffer o stringa
function base64url(input) {
  let bytes;
  if (typeof input === 'string') {
    bytes = new TextEncoder().encode(input);
  } else {
    bytes = new Uint8Array(input);
  }
  let bin = '';
  for (const b of bytes) bin += String.fromCharCode(b);
  return btoa(bin).replace(/=/g, '').replace(/\+/g, '-').replace(/\//g, '_');
}

// Genera JWT HS256 — stesso metodo di Unity
async function generateJwt(endpoint, hub, accessKey) {
  const header  = base64url('{"alg":"HS256","typ":"JWT"}');
  const now = Math.floor(Date.now() / 1000);
  const exp = now + 3600;
  const audience = endpoint + '/client/hubs/' + hub;
  const payload = base64url('{"aud":"' + audience + '","iat":' + now + ',"exp":' + exp + '}');

  const sigInput = header + '.' + payload;

  // Firma HMAC-SHA256 con la chiave come UTF-8 grezzo
  const keyData = new TextEncoder().encode(accessKey);
  const cryptoKey = await crypto.subtle.importKey(
    'raw', keyData, { name: 'HMAC', hash: 'SHA-256' }, false, ['sign']
  );
  const sig = await crypto.subtle.sign('HMAC', cryptoKey, new TextEncoder().encode(sigInput));

  return sigInput + '.' + base64url(sig);
}

function parseQrData(text) {
  text = text.trim();
  if (text.startsWith('{')) {
    try {
      const obj = JSON.parse(text);
      if (obj.projectId && obj.guideId)
        return { projectId: obj.projectId, guideId: obj.guideId };
    } catch(e) {}
  }
  if (text.includes('|')) {
    const parts = text.split('|');
    if (parts.length >= 2)
      return { projectId: parts[0].trim(), guideId: parts[1].trim() };
  }
  return null;
}

async function sendToWebPubSub(projectId, guideId) {
  const connStr = document.getElementById('connStr').value.trim();
  const hub     = document.getElementById('hub').value.trim()   || 'totem';
  const group   = document.getElementById('group').value.trim() || 'totem-001';
  const { endpoint, key } = parseConnString(connStr);

  if (!endpoint || !key) {
    showStatus('Connection String non valida.', 'error');
    return;
  }

  showStatus('Genero token e mi connetto...', 'info');

  try {
    const token = await generateJwt(endpoint, hub, key);
    const wsUrl = endpoint.replace('https://', 'wss://') + '/client/hubs/' + hub + '?access_token=' + token;

    // Subprotocol json.webpubsub.azure.v1 — come in Unity
    const ws = new WebSocket(wsUrl, 'json.webpubsub.azure.v1');

    await new Promise((res, rej) => {
      ws.onopen  = res;
      ws.onerror = () => rej(new Error('Connessione WebSocket fallita'));
      setTimeout(() => rej(new Error('Timeout connessione')), 8000);
    });

    // Entra nel gruppo
    ws.send(JSON.stringify({ type: 'joinGroup', group, ackId: 1 }));
    await new Promise(r => setTimeout(r, 500));

    // Invia il comando set_project al gruppo
    const innerPayload = JSON.stringify({
      type: 'set_project',
      data: JSON.stringify({ projectId, guideId })
    });

    ws.send(JSON.stringify({
      type: 'sendToGroup',
      group,
      dataType: 'text',
      data: innerPayload,
      ackId: 2
    }));

    await new Promise(r => setTimeout(r, 600));
    ws.close();

    showStatus('Totem sincronizzato! Project: ' + projectId.substring(0, 8) + '...', 'success');
  } catch(e) {
    showStatus('Errore: ' + e.message, 'error');
  }
}

function toggleScan() { scanning ? stopScan() : startScan(); }

async function startScan() {
  try {
    codeReader = new ZXing.BrowserMultiFormatReader();

    // Prova a listare le camere; il nome del metodo varia tra versioni ZXing
    let devices = [];
    try {
      if (typeof codeReader.listVideoInputDevices === 'function') {
        devices = await codeReader.listVideoInputDevices();
      } else if (typeof ZXing.BrowserCodeReader?.listVideoInputDevices === 'function') {
        devices = await ZXing.BrowserCodeReader.listVideoInputDevices();
      } else if (navigator.mediaDevices?.enumerateDevices) {
        const all = await navigator.mediaDevices.enumerateDevices();
        devices = all.filter(d => d.kind === 'videoinput');
      }
    } catch (e) {
      console.warn('Lista camere non disponibile, uso camera di default', e);
    }

    // Seleziona camera posteriore se disponibile
    let deviceId = undefined;
    if (devices.length > 0) {
      const back = devices.find(d => /back|rear|environment/i.test(d.label));
      deviceId = (back || devices[devices.length - 1]).deviceId;
    }

    document.getElementById('video-container').style.display = 'block';
    document.getElementById('btn-scan').textContent = 'Ferma scansione';
    scanning = true;
    showStatus('Camera attiva — inquadra il QR code', 'info');

    // Se non abbiamo un deviceId, passiamo null → ZXing usa la camera di default
    await codeReader.decodeFromVideoDevice(deviceId || null, 'video', (result) => {
      if (result) {
        const parsed = parseQrData(result.getText());
        if (parsed) {
          stopScan();
          document.getElementById('manualProjectId').value = parsed.projectId;
          document.getElementById('manualGuideId').value   = parsed.guideId;
          showStatus('QR letto! Invio al totem...', 'info');
          sendToWebPubSub(parsed.projectId, parsed.guideId);
        }
      }
    });
  } catch(e) {
    showStatus('Errore camera: ' + e.message, 'error');
    scanning = false;
  }
}

function stopScan() {
  if (codeReader) { codeReader.reset(); codeReader = null; }
  document.getElementById('video-container').style.display = 'none';
  document.getElementById('btn-scan').textContent = 'Scansiona QR code';
  scanning = false;
}

async function sendManual() {
  const projectId = document.getElementById('manualProjectId').value.trim();
  const guideId   = document.getElementById('manualGuideId').value.trim();
  if (!projectId || !guideId) {
    showStatus('Inserisci sia Project ID che Guide ID.', 'error');
    return;
  }
  await sendToWebPubSub(projectId, guideId);
}
</script>
</body>
</html>
